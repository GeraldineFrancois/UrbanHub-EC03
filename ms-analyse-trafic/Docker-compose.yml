services:
  ms-analyse-trafic:
    build: .
    container_name: ms_analyse_trafic
    ports:
      - "8003:8003"
    depends_on:
      - postgres
      - kafka
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:root@postgres:5432/analyse_trafic_db
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_COLLECTE_TOPIC: collecte.iot
      KAFKA_ALERT_TOPIC: analyse.trafic.alertes
      KAFKA_CONSUMER_ENABLED: "true"
      MS_API_KEY: "urbanhub-internal-key"

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: analyse_trafic_db
    ports:
      - "5432:5432"
    volumes:
      - ./db_analyse_trafic.sql:/docker-entrypoint-initdb.d/00_db_analyse_trafic.sql:ro

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1